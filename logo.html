<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Doramas – Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A16;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      gap: 48px;
    }
    .label {
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <!-- Ícone 512×512 — escala exata do código original (36px → 512px) -->
  <div>
    <div class="label">Ícone do App — 512 × 512</div>
    <div style="
      width: 512px;
      height: 512px;
      border-radius: 142px;
      background: linear-gradient(135deg, #7C3AED, #2563EB);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 228px rgba(124,58,237,0.5);
      flex-shrink: 0;
    ">
      <span style="
        color: #fff;
        font-weight: 900;
        font-size: 256px;
        line-height: 1;
        font-family: 'Inter', sans-serif;
      ">S</span>
    </div>
  </div>

  <!-- Logotipo horizontal — idêntico ao nav do site -->
  <div>
    <div class="label">Logotipo Horizontal</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#7C3AED,#2563EB);display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(124,58,237,0.5);flex-shrink:0;">
        <span style="color:#fff;font-weight:900;font-size:18px;line-height:1;font-family:'Inter',sans-serif;">S</span>
      </div>
      <span style="color:#fff;font-weight:800;font-size:1.125rem;line-height:1;white-space:nowrap;">Super<span style="background:linear-gradient(135deg,#C084FC,#818CF8,#60A5FA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Doramas</span></span>
    </div>
  </div>

</body>
</html>
